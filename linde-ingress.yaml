apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linde-ingress
  namespace: linde
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - computervision.linde.com
      secretName: linde-prod-tls
  rules:
    - host: computervision.linde.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linde-service
                port:
                  number: 3000
          - path: /edge
            pathType: Prefix
            backend:
              service:
                name: linde-service
                port:
                  number: 3001
